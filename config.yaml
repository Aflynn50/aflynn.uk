baseURL: https://aflynn.uk
title: Alastair Flynn
defaultContentLanguage: 'en'
googleAnalytics: ''

params:
  image: '/images/banner.png'
  #copyright: All rights reserved.
  title: Alastair Flynn
  author: Alastair Flynn
  logo: '/camerame.jpg'
  dontShowSource: false # please, do not do this :)
  portfolio:
    columns:
      desktop:
        # art: 4
        # archive: 6
        graphic: 3
        web: 2
        ny: 1
        books: 4
        default: 3
      mobile:
        default: 2
        books: 2
        # archive: 3
  socials:
    - icon: 'far fa-envelope fa-lg'
      image: '/envelope-regular.svg'
      url: 'mailto:af@aflynn.uk'
    - icon: 'fa-brands fa-goodreads-g'
      image: '/homemade-goodreads.svg'
      url: 'https://www.goodreads.com/user/show/189361483-alastair-flynn'
    - icon: 'fab fa-github fa-lg'
      image: '/github.svg'
      url: 'https://github.com/Aflynn50/'
    - icon: 'fab fa-linkedin-in fa-lg'
      image: '/linkedin-in.svg'
      url: 'https://linkedin.com/in/alastair-flynn'
    - icon: 'fas fa-rss fa-lg'
      image: '/rss-solid.svg'
      url: 'https://aflynn.uk/blog/index.xml'
  homepage: "/about" # homepage link, mostly same with menu.main[0]
  bypassWelcomePage: true # redirects "/" to "homepage" when it's true.

markup:
  defaultMarkdownHandler: goldmark
  goldmark:
    renderer:
      unsafe: true
  highlight:
    style: onedark

theme: 
  - hugo-embed-pdf-shortcode

taxonomies:
  tag: tags

permalinks:
  work: ":contentbasename/"

menu:
  main:
    - name: about
      url: /about/
      weight: 1
    - name: blog
      url: /blog/
      weight: 2
    - name: photos
      url: /tags/archive
      weight: 3
    - name: books
      url: /books/
      weight: 4
    - name: cv
      url: /alastairflynn.pdf
      weight: 5
