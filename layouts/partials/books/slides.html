<div class="slider" id="book-slider">
	{{ range $i, $post := ($.Get "posts") }}
	    {{ partial "books/slide.html" (dict "ctx" $post) }}
	{{ end }}
	<a class="prev" onclick="plusBookSlides(-1)">&#10094;</a>
	<a class="next" onclick="plusBookSlides(1)">&#10095;</a>
	<button onclick="closeBookSlider()" class="modal-close" aria-label="close"></button>
</div>
